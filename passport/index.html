<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Passport</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="passport-page">

    <img class="passport-bg" src="../assets/passport-bg.png" alt="">

    <div class="stamp-grid">
      <div class="stamp-slot" id="slot-how-digital">
        <img src="../assets/stamps/how-digital.png" alt="How Digital">
      </div>
      <div class="stamp-slot" id="slot-blc">
        <img src="../assets/stamps/blc.png" alt="BLC">
      </div>
      <div class="stamp-slot" id="slot-digital-programmes">
        <img src="../assets/stamps/digital-programmes.png" alt="Digital Programmes">
      </div>
      <div class="stamp-slot" id="slot-he">
        <img src="../assets/stamps/he.png" alt="HE">
      </div>
      <div class="stamp-slot" id="slot-aqp">
        <img src="../assets/stamps/aqp.png" alt="AQP">
      </div>
      <div class="stamp-slot" id="slot-construction">
        <img src="../assets/stamps/construction.png" alt="Construction">
      </div>
    </div>

  </div>

  <div class="celebration" id="celebration" aria-hidden="true">
    <div class="celebration__card" role="dialog" aria-labelledby="celebration-heading">
      <span class="celebration__kicker">Passport Complete</span>
      <h1 class="celebration__heading" id="celebration-heading">Well done!</h1>
      <p class="celebration__body">
        You've collected all six stamps — amazing work. You're now in the running
        for our prize raffle. Pop your name in below and send us your entry to
        confirm your place in the draw.
      </p>
      <input type="text" id="entrant-name" class="celebration__input" placeholder="Your name" autocomplete="name" maxlength="80">
      <button type="button" class="celebration__btn" id="enter-raffle">Enter the raffle</button>
      <p class="celebration__hint">This opens your email app to send your entry to the How Digital team.</p>
    </div>
  </div>

  <script>
    (function () {
      var STAMPS = ['how-digital', 'blc', 'digital-programmes', 'he', 'aqp', 'construction'];
      var STORAGE_KEY = 'howdigital_passport';

      var data = {};
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (e) {}

      var count = 0;
      STAMPS.forEach(function (id) {
        if (data[id]) {
          var slot = document.getElementById('slot-' + id);
          if (slot) slot.classList.add('collected');
          count++;
        }
      });

      if (count === STAMPS.length) {
        var celebration = document.getElementById('celebration');
        // Wait for the final stamp to land before celebrating.
        setTimeout(function () {
          celebration.classList.add('visible');
          celebration.setAttribute('aria-hidden', 'false');
        }, 900);

        var nameInput = document.getElementById('entrant-name');

        document.getElementById('enter-raffle').addEventListener('click', function () {
          var name = nameInput.value.trim();
          if (!name) {
            nameInput.focus();
            nameInput.classList.remove('shake');
            // Reflow so the animation can replay on repeated empty clicks.
            void nameInput.offsetWidth;
            nameInput.classList.add('shake');
            return;
          }

          var subject = 'HD Passport completed — ' + name;
          var body =
            'I\'ve completed the How Digital passport and collected all six stamps.\n\n' +
            'Name: ' + name + '\n\n' +
            'Please enter me into the prize raffle.';

          window.location.href =
            'mailto:howdigital@howcollege.ac.uk' +
            '?subject=' + encodeURIComponent(subject) +
            '&body=' + encodeURIComponent(body);
        });
      }
    })();
  </script>
</body>
</html>
